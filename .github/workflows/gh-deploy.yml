name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build test site & deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ format('{0}-pages', 'github') }}
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install clang and lld
        run: sudo apt-get update && sudo apt-get install -y clang lld

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dev dependencies
        run: npm ci --ignore-scripts

      - name: Build browser test WASM
        run: npm run build:test

      - name: Prepare Pages artifact
        run: node scripts/prepare-pages.mjs

      # serve.json is only read by the local `serve` CLI (WASM Content-Type).
      # GitHub Pages serves .wasm as application/wasm natively — no serve.json needed.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
