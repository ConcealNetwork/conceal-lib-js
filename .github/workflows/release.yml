name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install clang and lld
        run: sudo apt-get update && sudo apt-get install -y clang lld

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dev dependencies
        run: npm ci --ignore-scripts

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            echo "Bump package.json to $TAG before tagging, or retag after bumping."
            exit 1
          fi
          echo "OK: tag v$TAG matches package.json $PKG"

      - name: Build WASM
        run: npm run build

      - name: Generate TypeScript declarations
        run: npm run types

      - name: Pack tarball
        run: npm pack --ignore-scripts

      - name: Verify pack output
        run: ls -la *.tgz

      - name: Create GitHub Release and upload tarball
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            *.tgz
          fail_on_unmatched_files: true
          generate_release_notes: true
